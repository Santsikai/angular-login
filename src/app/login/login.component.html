<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <h1>Bienvenido</h1>
      <p>Inicia sesión para continuar</p>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="login-form" novalidate>

      <div class="form-group">
        <label for="username">Usuario</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.5"/>
              <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </span>
          <input
            id="username"
            type="text"
            [(ngModel)]="username"
            name="username"
            placeholder="Introduce tu usuario"
            required
            #usernameField="ngModel"
            [class.invalid]="usernameField.invalid && usernameField.touched"
          />
        </div>
        <span class="field-error" *ngIf="usernameField.invalid && usernameField.touched">El usuario es obligatorio.</span>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="5" y="11" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/>
              <path d="M8 11V7a4 4 0 0 1 8 0v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </span>
          <input
            id="password"
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="Introduce tu contraseña"
            required
            #passwordField="ngModel"
            [class.invalid]="passwordField.invalid && passwordField.touched"
          />
        </div>
        <span class="field-error" *ngIf="passwordField.invalid && passwordField.touched">La contraseña es obligatoria.</span>
      </div>

      <div class="error-banner" *ngIf="errorMessage">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/>
          <path d="M12 8v5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="12" cy="16" r="0.5" fill="currentColor" stroke="currentColor"/>
        </svg>
        {{ errorMessage }}
      </div>

      <button type="submit" [disabled]="loading || loginForm.invalid" class="btn-login">
        <span *ngIf="!loading">Iniciar sesión</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>

    </form>

    <p class="demo-hint">Demo: <strong>admin</strong> / <strong>admin123</strong></p>
  </div>
</div>
